services:
  gwctr:
    build:
      context: .
      network: host
    image: gwctr:latest
    container_name: gwctr
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /run/docker/plugins:/run/docker/plugins
      - /lib/modules:/lib/modules:ro
    command: ["-debug"]
